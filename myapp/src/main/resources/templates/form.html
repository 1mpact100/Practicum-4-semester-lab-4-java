<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Upload PNG</title>
</head>
<body>
    <h1>Загрузка изображения</h1>

    <form th:action="@{/size2json}" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/png" required>
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
